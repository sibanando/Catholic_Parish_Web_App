services:
  postgres:
    image: postgres:16-alpine
    container_name: parish-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: parish_db
    volumes:
      - parish_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  backend:
    build: ./backend
    image: ${REGISTRY:-parish-app}/backend:${IMAGE_TAG:-latest}
    container_name: parish-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/parish_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DATABASE_SSL: ${DATABASE_SSL:-false}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
        reservations:
          memory: 256M
          cpus: '0.25'

  frontend:
    build: ./frontend
    image: ${REGISTRY:-parish-app}/frontend:${IMAGE_TAG:-latest}
    container_name: parish-frontend
    restart: always
    environment:
      # Must match the 'backend' service name above for Docker DNS resolution
      BACKEND_HOST: backend
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
        reservations:
          memory: 64M
          cpus: '0.05'

volumes:
  parish_data:
