# IMPORTANT: Replace all placeholder values before applying.
# Generate secrets with: openssl rand -hex 32
#
# To apply:
#   kubectl apply -f k8s/secret.yaml
#
# To update a single value without editing this file:
#   kubectl create secret generic parish-secrets -n parish \
#     --from-literal=POSTGRES_PASSWORD=<value> \
#     --from-literal=DATABASE_URL=postgresql://postgres:<password>@postgres:5432/parish_db \
#     --from-literal=JWT_SECRET=<value> \
#     --from-literal=JWT_REFRESH_SECRET=<value> \
#     --save-config --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: parish-secrets
  namespace: parish
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  DATABASE_URL: "postgresql://postgres:REPLACE_WITH_STRONG_PASSWORD@postgres:5432/parish_db"
  JWT_SECRET: "REPLACE_WITH_32_CHAR_RANDOM_STRING"
  JWT_REFRESH_SECRET: "REPLACE_WITH_32_CHAR_RANDOM_STRING"
